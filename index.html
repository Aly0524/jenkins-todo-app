<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Automated ToDo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="noise"></div>
  <div class="glow-orb glow-1"></div>
  <div class="glow-orb glow-2"></div>

  <main class="app">
    <header class="app-header">
      <div class="header-left">
        <div class="logo-mark">✦</div>

        <div>
          <h1>TaskFlow</h1>
          <p class="subtitle">Automated & CI/CD-monitored</p>
        </div>
      </div>

      <div class="ci-pill">
        <span class="pulse-dot"></span>
        Jenkins Active
      </div>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-val" id="stat-total">0</span>
        <span class="stat-key">Total</span>
      </div>

      <div class="stat-card accent">
        <span class="stat-val" id="stat-done">0</span>
        <span class="stat-key">Done</span>
      </div>

      <div class="stat-card">
        <span class="stat-val" id="stat-left">0</span>
        <span class="stat-key">Remaining</span>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-meta">
        <span>Progress</span>
        <span id="prog-pct">0%</span>
      </div>

      <div class="progress-track">
        <div class="progress-fill" id="progFill"></div>
      </div>
    </div>

    <div class="input-area">
      <input
        id="taskInput"
        class="task-input"
        type="text"
        placeholder="Anong dapat gawin ngayon…"
        autocomplete="off"
      />

      <button class="add-btn" id="addTaskBtn">
        Add
      </button>
    </div>

    <div class="filter-tabs">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="active">Active</button>
      <button class="tab" data-filter="done">Done</button>
    </div>

    <ul class="task-list" id="taskList"></ul>
  </main>

  <script src="app.js"></script>
</body>
</html>
